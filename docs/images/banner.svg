<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-label="Project Jerico banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1f2f"/>
      <stop offset="100%" stop-color="#174b63"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00c2ff"/>
      <stop offset="100%" stop-color="#5df2a5"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="360" fill="url(#bg)"/>
  <g opacity="0.15" fill="none" stroke="#ffffff" stroke-width="2">
    <circle cx="170" cy="120" r="90"/>
    <circle cx="170" cy="120" r="130"/>
    <circle cx="1090" cy="250" r="80"/>
    <circle cx="1090" cy="250" r="120"/>
  </g>

  <rect x="80" y="80" width="520" height="12" rx="6" fill="url(#accent)"/>
  <text x="80" y="160" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="64" font-weight="700">
    Project Jerico
  </text>
  <text x="80" y="210" fill="#cbe5f2" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="500">
    CCTV Threat Intelligence Dashboard
  </text>
  <text x="80" y="250" fill="#a8d0e2" font-family="Segoe UI, Arial, sans-serif" font-size="22">
    YOLO + MIL Anomaly Detection + Scene Understanding
  </text>

  <g transform="translate(840,70)">
    <rect x="0" y="0" width="360" height="220" rx="16" fill="#0f2d40" stroke="#4dd0ff"/>
    <rect x="20" y="20" width="320" height="140" rx="10" fill="#163c54"/>
    <rect x="40" y="40" width="120" height="80" rx="6" fill="#5df2a5" opacity="0.25"/>
    <rect x="180" y="40" width="140" height="16" rx="8" fill="#aee7ff" opacity="0.8"/>
    <rect x="180" y="66" width="110" height="16" rx="8" fill="#aee7ff" opacity="0.6"/>
    <rect x="180" y="92" width="130" height="16" rx="8" fill="#aee7ff" opacity="0.45"/>
    <rect x="20" y="180" width="90" height="18" rx="9" fill="#ff6b6b"/>
    <rect x="120" y="180" width="90" height="18" rx="9" fill="#ffd166"/>
    <rect x="220" y="180" width="120" height="18" rx="9" fill="#5df2a5"/>
  </g>
