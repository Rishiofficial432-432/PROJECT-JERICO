    <path d="M510 165 L550 125"/>
    <path d="M510 165 L550 245"/>
    <path d="M850 125 L890 125"/>
    <path d="M850 245 L890 245"/>
    <path d="M1055 170 L1055 200"/>
    <path d="M1055 290 L645 320"/>
  </g>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#3e7fa0"/>
