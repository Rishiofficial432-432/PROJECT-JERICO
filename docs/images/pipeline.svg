<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="420" viewBox="0 0 1280 420" role="img" aria-label="Jerico pipeline diagram">
  <rect width="1280" height="420" fill="#f7fbfd"/>
  <text x="40" y="52" fill="#0d2a3a" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Detection Pipeline</text>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600" fill="#11364b">
    <rect x="40" y="120" width="210" height="90" rx="12" fill="#d9f0ff" stroke="#4faed8"/>
    <text x="72" y="173">Media Upload</text>

    <rect x="290" y="120" width="220" height="90" rx="12" fill="#dff8ec" stroke="#4bbf8a"/>
